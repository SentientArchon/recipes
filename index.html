<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Recipes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:     #16100A;
      --surface:#1F1610;
      --border: #2E2015;
      --terra:  #C96A2B;
      --cream:  #F0E6D0;
      --muted:  #7A6A58;
      --dim:    #3A2810;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    /* ── Header ──────────────────────────────────── */
    header {
      position: relative;
      padding: 3rem 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    header::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--terra);
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--terra);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(2.4rem, 9vw, 3.4rem);
      line-height: 1.0;
      color: var(--cream);
      margin-bottom: 0.5rem;
    }

    h1 em {
      font-weight: 400;
      font-style: italic;
      display: block;
      font-size: 0.52em;
      color: var(--terra);
      margin-bottom: 0.15em;
    }

    .header-note {
      font-size: 0.82rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 0.6rem;
    }

    /* ── Recipe grid ─────────────────────────────── */
    .grid {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--terra);
      margin-bottom: 0.2rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── Recipe card ─────────────────────────────── */
    a.card {
      display: block;
      text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.2rem 1rem;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    a.card:active,
    a.card:hover {
      border-color: var(--terra);
      background: #241a0e;
    }

    a.card::after {
      content: '→';
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--terra);
    }

    .card-method {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--terra);
      margin-bottom: 0.45rem;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.2;
      margin-bottom: 0.8rem;
      padding-right: 2rem;
    }

    .card-stats {
      display: flex;
      gap: 1.5rem;
    }

    .card-stat {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .stat-val {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--terra);
    }

    .stat-lbl {
      font-family: 'DM Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Footer ──────────────────────────────────── */
    footer {
      padding: 0 1.5rem;
      margin-top: 1rem;
    }

    .footer-note {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-align: center;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <header>
    <p class="eyebrow">Batch Cooking · High Protein</p>
    <h1><em>Eduardo's</em>Recipes</h1>
    <p class="header-note">Tap a recipe to open its shopping list and cooking guide.</p>
  </header>

  <main class="grid">
    <p class="section-label">Available Recipes</p>

    <a class="card" href="chicken-lentil-stew.html">
      <p class="card-method">Slow Cooker</p>
      <p class="card-title">Chicken & Lentil Stew</p>
      <div class="card-stats">
        <div class="card-stat">
          <span class="stat-val">~42 g</span>
          <span class="stat-lbl">Protein / Portion</span>
        </div>
        <div class="card-stat">
          <span class="stat-val">6–8 hrs</span>
          <span class="stat-lbl">Cook Time</span>
        </div>
        <div class="card-stat">
          <span class="stat-val">6</span>
          <span class="stat-lbl">Default Portions</span>
        </div>
      </div>
    </a>

  </main>

  <footer>
    <p class="footer-note">More recipes added as pages are built</p>
  </footer>

</body>
</html>
